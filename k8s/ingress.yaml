apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-ingress-probe
  labels:
    app: nginx-ingress-probe
spec:
  # Route through the NGINX Plus Ingress Controller you want to test by setting its
  # IngressClass (often "nginx"). Omit ingressClassName to use the cluster default.
  # ingressClassName: nginx
  rules:
    - host: probe.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-ingress-probe
                port:
                  number: 80
