apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-ingress-probe
  labels:
    app: nginx-ingress-probe
spec:
  # Uses the cluster's default IngressClass for portability. If your cluster has no
  # default, set `ingressClassName:` to match your controller (nginx, etc.).
  rules:
    - host: probe.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-ingress-probe
                port:
                  number: 80
